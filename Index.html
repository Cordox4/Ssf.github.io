<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060608">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KICKSTREAM</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-mark">K</div>KICKSTREAM
    </div>
    <div class="nav-r">
      <div class="nav-btn" id="btn-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="16" height="16"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="nav-btn" id="btn-notifs" style="position:relative">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="16" height="16"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <div class="ndot" id="ndot" style="display:none"></div>
      </div>
    </div>
  </nav>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker">
      <span class="t-item" style="color:var(--t3);font-size:11px;letter-spacing:1px">CHARGEMENT DES SCORES…</span>
    </div>
  </div>

  <div class="scroll" id="scroll">
    <div id="content"></div>
  </div>

  <div class="bar">
    <div class="bi on" data-pg="home">
      <svg class="bi-ico" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      <div class="bi-lbl">Live</div>
    </div>
    <div class="bi" data-pg="schedule">
      <svg class="bi-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="20" height="20"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <div class="bi-lbl">Programme</div>
    </div>
    <div class="bi" data-pg="standings">
      <svg class="bi-ico" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg>
      <div class="bi-lbl">Classement</div>
    </div>
    <div class="bi" data-pg="favorites">
      <svg class="bi-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="20" height="20"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <div class="bi-lbl">Favoris</div>
    </div>
    <div class="bi" data-pg="profile">
      <svg class="bi-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="20" height="20"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <div class="bi-lbl">Profil</div>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════
     LECTEUR VIDEO
     ═══════════════════════════════════════════════════ -->
<div class="player-ov" id="modal" style="display:none">

  <!-- ZONE VIDEO -->
  <div class="player-stage" id="player-stage">
    <video id="main-vid" playsinline preload="none" webkit-playsinline></video>

    <!-- Ecran de remplacement quand pas de stream -->
    <div class="player-screen" id="m-fallback">
      <div class="ps-glow"></div>
      <div class="ps-grid"></div>
      <div class="ps-content">
        <div class="ps-teams">
          <div class="ps-team">
            <div class="ps-crest" id="fb-crest1"></div>
            <span class="ps-tname" id="fb-home">—</span>
          </div>
          <div class="ps-vs">
            <div class="ps-score" id="fb-score">—</div>
            <div class="ps-min" id="fb-min">—</div>
          </div>
          <div class="ps-team">
            <div class="ps-crest" id="fb-crest2"></div>
            <span class="ps-tname" id="fb-away">—</span>
          </div>
        </div>
        <div class="ps-no-stream">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/><line x1="1" y1="1" x2="23" y2="23" stroke-width="2"/></svg>
          Aucun flux disponible
        </div>
      </div>
    </div>

    <!-- Zone de tap (play/pause au toucher) -->
    <div class="player-tap" id="player-tap"></div>

    <!-- Flash central play/pause -->
    <div class="player-flash" id="player-flash">
      <div class="pf-ring"></div>
      <svg class="pf-ico" id="pf-ico" viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M8 5v14l11-7z"/></svg>
    </div>

    <!-- HUD score (visible en permanence) -->
    <div class="player-hud" id="player-hud">
      <div class="ph-team">
        <div class="crest crest-sm" id="hud-c1"></div>
        <span class="ph-name" id="hud-n1">—</span>
      </div>
      <div class="ph-center">
        <div class="ph-score" id="hud-sc">—:—</div>
        <div class="ph-min" id="hud-min">—</div>
      </div>
      <div class="ph-team ph-team-r">
        <span class="ph-name" id="hud-n2">—</span>
        <div class="crest crest-sm" id="hud-c2"></div>
      </div>
    </div>

    <!-- Controles (auto-hide apres 3s) -->
    <div class="player-ctrls" id="player-ctrls">

      <!-- Barre de progression interactive -->
      <div class="pc-prog-zone" id="pc-prog-zone">
        <div class="pc-time-left" id="pc-time-left">LIVE</div>
        <div class="pc-time-right" id="pc-time-right"></div>
        <div class="pc-track" id="pc-track">
          <div class="pc-track-bg"></div>
          <div class="pc-track-fill" id="pc-fill"></div>
          <div class="pc-track-thumb" id="pc-thumb"></div>
        </div>
      </div>

      <!-- Ligne de boutons -->
      <div class="pc-btns">
        <!-- Gauche : play + volume -->
        <div class="pc-left">
          <button class="pc-btn pc-btn-main" id="mc-play" aria-label="Lecture/Pause">
            <svg id="ico-pause" viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            <svg id="ico-play" viewBox="0 0 24 24" fill="currentColor" width="22" height="22" style="display:none"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <div class="pc-vol-wrap">
            <button class="pc-btn" id="pc-mute" aria-label="Muet">
              <svg id="ico-vol" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
              <svg id="ico-mute" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>
          </div>
        </div>

        <!-- Centre : titre + qualite -->
        <div class="pc-center">
          <span class="pc-title" id="pc-title">—</span>
        </div>

        <!-- Droite : qualite + PiP + plein ecran -->
        <div class="pc-right">
          <button class="pc-btn pc-btn-q" id="mc-q" aria-label="Qualite">HD</button>
          <button class="pc-btn" id="mc-pip" aria-label="Image dans image">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 7h-8v6h8V7zm2-4H3C1.9 3 1 3.9 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z"/></svg>
          </button>
          <button class="pc-btn" id="mc-fs" aria-label="Plein ecran">
            <svg id="ico-fs" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            <svg id="ico-exit-fs" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Bouton fermer flottant (toujours visible) -->
    <button class="player-close-btn" id="mc-close-btn" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

  <!-- PANNEAU INFO MATCH -->
  <div class="player-info">
    <div class="pi-header">
      <div class="pi-text">
        <div class="pi-comp" id="mi-league">—</div>
        <div class="pi-match" id="mi-title">—</div>
        <div class="pi-status" id="mi-sub">—</div>
      </div>
      <button class="pi-close" id="mi-close" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <div class="pi-actions">
      <button class="pi-btn" id="mi-stats">
        <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg>
        Stats
      </button>
      <button class="pi-btn" id="mi-fav">
        <svg id="ico-fav-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <svg id="ico-fav-in" viewBox="0 0 24 24" fill="currentColor" width="15" height="15" style="display:none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <span id="fav-label">Sauvegarder</span>
      </button>
      <button class="pi-btn" id="mi-share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="15" height="15"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Partager
      </button>
    </div>

    <div id="modal-evs"></div>
  </div>
</div>

<!-- LEGAL MODAL -->
<div class="legal-ov" id="legal-ov" style="display:none">
  <div class="legal-sheet" id="legal-sheet">
    <div class="legal-handle"></div>
    <div class="legal-head">
      <span class="legal-title" id="legal-title">Conditions</span>
      <div class="legal-close" id="legal-close">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </div>
    </div>
    <div class="legal-body" id="legal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="app.js"></script>
</body>
</html>
